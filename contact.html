<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONOGRID Clone | Contact</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- LENIS SMOOTH SCROLL (MISSING SCRIPT FIXED!) -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
</head>
<body class="bg-black text-light overflow-hidden contact-split-page new-contact-theme">

    <!-- Preloader -->
    <div id="app-loading-container">
        <div id="app-loading">
            <svg class="spinner" viewBox="0 0 50 50">
                <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="2"></circle>
            </svg>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>

    <!-- Abstract Halftone Background (Now Green) -->
    <div class="contact-bg-green"></div>

    <!-- Header Unified -->
    <header class="header">
        <a href="index.html" class="header-logo">MONOGRID.</a>
        <nav class="header-nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="works.html" class="nav-link">Work</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="contact.html" class="nav-link active">Contact</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="contact-v2-main">
        <div class="cv-left">
            <h1 class="cv-giant-title">Hello,<br>future.</h1>
            <p class="cv-sub">Let's create something beautifully brutally digital.</p>
            
            <div class="cv-info-grid">
                <div>
                    <h4>NEW BUSINESS</h4>
                    <a href="mailto:hello@monogrid.com" class="cv-link">hello@monogrid.com</a>
                </div>
                <div>
                    <h4>JOIN US</h4>
                    <a href="mailto:jobs@monogrid.com" class="cv-link">jobs@monogrid.com</a>
                </div>
            </div>
        </div>

        <div class="cv-right">
            <form class="cv-form">
                <div class="cv-form-row">
                    <input type="text" placeholder="FIRST NAME*" required>
                    <input type="text" placeholder="LAST NAME*" required>
                </div>
                <div class="cv-form-row">
                    <input type="email" placeholder="E-MAIL*" required>
                    <input type="text" placeholder="COMPANY">
                </div>
                <div class="cv-form-row">
                    <textarea placeholder="HOW CAN WE HELP YOU?*" rows="4" required></textarea>
                </div>
                <div class="form-checkbox">
                    <label class="custom-checkbox">
                        <input type="checkbox" required>
                        <span class="checkmark"></span>
                        <p>I agree to the <a href="#">privacy terms</a>.</p>
                    </label>
                </div>
                <button type="submit" class="cv-submit" data-cursor-text="SUBMIT">SEND INQUIRY</button>
            </form>
        </div>
    </main>

    <!-- Footer Unified -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-top">
                <h2 data-cursor-text="SAY HI!">SAY<br>HELLO.</h2>
                <a href="mailto:hello@monogrid.com" class="footer-email">hello@monogrid.com</a>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 MONOGRID. ALL RIGHTS RESERVED.</p>
                <div class="footer-links">
                    <a href="#">Instagram</a>
                    <a href="#">LinkedIn</a>
                    <a href="#">Twitter</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
